data:
  raw_dir: "data/raw/RawData/Training"
  train_dir: "data/processed/RawData/Training"
  processed_dir: "data/processed/RawData/Training"
  test_dir: "data/processed/RawData/Testing"
  num_classes: 14
  patch_size: [96, 96, 96]
  target_spacing: [1.5, 1.5, 2.0]
  intensity_clip: [-175, 250]
  pos_neg_ratio: 2
  cache_rate: 0.0

training:
  batch_size: 1
  num_epochs: 300
  learning_rate: 0.0001
  weight_decay: 0.00001
  num_folds: 5
  num_workers: 4
  val_interval: 10
  seed: 42
  amp: true

model:
  architecture: "SwinUNETR"
  in_channels: 1
  out_channels: 14
  feature_size: 48
  depths: [2, 2, 2, 2]
  num_heads: [3, 6, 12, 24]
  norm: "instance"
  drop_rate: 0.0
  attn_drop_rate: 0.0
  dropout_path_rate: 0.1
  normalize: true
  use_checkpoint: true
  use_v2: false
  downsample: "merging"

loss:
  name: "DiceCE"
  dice_weight: 1.0
  ce_weight: 1.0
  class_weights: [0.05, 0.5, 0.5, 0.5, 2.0, 2.0, 0.3, 1.0, 0.5, 1.0, 1.5, 2.0, 2.0, 2.0]

evaluation:
  sliding_window_size: [96, 96, 96]
  overlap: 0.5
  sw_batch_size: 4

output:
  checkpoint_dir: "results/checkpoints_swin_unetr"
  prediction_dir: "results/predictions_swin_unetr"
  figures_dir: "results/figures_swin_unetr"
  metrics_dir: "results/metrics_swin_unetr"
