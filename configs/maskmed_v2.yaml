data:
  raw_dir: "data/raw/RawData/Training"
  train_dir: "data/processed/RawData/Training"
  processed_dir: "data/processed/RawData/Training"
  test_dir: "data/processed/RawData/Testing"
  num_classes: 14
  patch_size: [80, 80, 80]
  target_spacing: [1.5, 1.5, 2.0]
  normalization: "nnunet_ct"
  intensity_clip: [-175, 250]
  pos_neg_ratio: 0.5
  cache_rate: 0.0

training:
  batch_size: 2
  num_epochs: 1000
  train_iterations_per_epoch: 250
  learning_rate: 0.001
  weight_decay: 0.00003
  num_folds: 5
  num_workers: 4
  val_interval: 10
  seed: 42
  amp: true
  augmentation_profile: "nnunet_like"
  samples_per_volume: 1
  optimizer: "sgd"
  momentum: 0.99
  nesterov: true
  scheduler: "polynomial"
  poly_power: 0.9
  transformer_lr_ratio: 0.1

model:
  architecture: "MaskMed"
  in_channels: 1
  out_channels: 14
  channels: [32, 64, 128, 256]
  hidden_dim: 192
  mask_dim: 128
  num_queries: 13
  num_heads: 8
  num_points: 4
  dropout: 0.1
  norm: "instance"
  attention_pool_sizes:
    - [6, 6, 6]
    - [10, 10, 10]
    - [14, 14, 14]

loss:
  name: "MaskMed"
  class_weight: 2.0
  mask_bce_weight: 10.0
  mask_dice_weight: 10.0

evaluation:
  sliding_window_size: [80, 80, 80]
  overlap: 0.5
  sw_batch_size: 4

output:
  checkpoint_dir: "results/checkpoints_maskmed_v2"
  prediction_dir: "results/predictions_maskmed_v2"
  figures_dir: "results/figures_maskmed_v2"
  metrics_dir: "results/metrics_maskmed_v2"
